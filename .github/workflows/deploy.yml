# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  # main ブランチへのpush時に実行
  push:
    branches: [main]
  # 手動実行も可能にする
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を制御（古いデプロイをキャンセル）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Astro のビルド
        uses: withastro/action@v3
        # package-lock.json があれば自動で依存解決・ビルドされます
        # Node.js バージョンを固定したい場合は with: node-version: 20 などを指定

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
